services:
  - type: web
    name: smetaoffice-official
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: false
    disk:
      name: smetaoffice-data
      mountPath: /var/data/smetaoffice
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMETA_DATA_DIR
        value: /var/data/smetaoffice
      - key: SMETA_AUTH_MODE
        value: server
      - key: SMETA_SESSION_TTL_HOURS
        value: 24
      - key: SMETA_BOOTSTRAP_OWNER_LOGIN
        sync: false
      - key: SMETA_BOOTSTRAP_OWNER_PASSWORD
        sync: false
      - key: SMETA_BOOTSTRAP_OWNER_NAME
        sync: false
